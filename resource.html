<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Hub - Lucy Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a2a6c;
            --bg: #eff2f5;
        }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        .header {
            background: var(--primary);
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .container { padding: 15px; }

        .resource-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .info { display: flex; align-items: center; gap: 15px; }
        .info i { font-size: 24px; color: #e74c3c; } /* PDF Icon Color */
        .info h4 { margin: 0; font-size: 16px; }
        .info p { margin: 2px 0 0; font-size: 12px; color: #777; }

        .download-btn {
            background: #27ae60;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-arrow-left" onclick="window.location.href='dashbord.html'" style="cursor:pointer;"></i>
        <h3 style="margin:0;">Resource Hub</h3>
    </div>

    <div class="container">
        <div class="resource-card">
            <div class="info">
                <i class="fas fa-file-pdf"></i>
                <div>
                    <h4>Grade 12 Maths Textbook</h4>
                    <p>File Size: 4.5 MB</p>
                </div>
            </div>
            <a href="grade12_maths.pdf" download class="download-btn">
                <i class="fas fa-download"></i> Download
            </a>
        </div>

        <div class="resource-card">
            <div class="info">
                <i class="fas fa-file-pdf"></i>
                <div>
                    <h4>English Grammar Guide</h4>
                    <p>File Size: 2.1 MB</p>
                </div>
            </div>
            <a href="english_guide.pdf" download class="download-btn">
                <i class="fas fa-download"></i> Download
            </a>
        </div>
    </div>

</body>
</html>
